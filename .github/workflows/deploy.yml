name: Deploy to Firebase

on:
  push:
    branches: [main]
  workflow_dispatch:   # Allow manual trigger from GitHub UI

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install Functions dependencies
        run: npm ci
        working-directory: functions

      - name: Inject environment values into environment.prod.ts
        run: |
          sed -i "s|%%FIREBASE_API_KEY%%|${{ secrets.FIREBASE_API_KEY }}|g" src/environments/environment.prod.ts
          sed -i "s|%%FIREBASE_AUTH_DOMAIN%%|${{ secrets.FIREBASE_AUTH_DOMAIN }}|g" src/environments/environment.prod.ts
          sed -i "s|%%FIREBASE_PROJECT_ID%%|${{ secrets.FIREBASE_PROJECT_ID }}|g" src/environments/environment.prod.ts
          sed -i "s|%%FIREBASE_STORAGE_BUCKET%%|${{ secrets.FIREBASE_STORAGE_BUCKET }}|g" src/environments/environment.prod.ts
          sed -i "s|%%FIREBASE_MESSAGING_SENDER_ID%%|${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}|g" src/environments/environment.prod.ts
          sed -i "s|%%FIREBASE_APP_ID%%|${{ secrets.FIREBASE_APP_ID }}|g" src/environments/environment.prod.ts
          sed -i "s|%%FIREBASE_MEASUREMENT_ID%%|${{ secrets.FIREBASE_MEASUREMENT_ID }}|g" src/environments/environment.prod.ts
          sed -i "s|%%ADMIN_EMAILS%%|${{ secrets.ADMIN_EMAILS }}|g" src/environments/environment.prod.ts

      - name: Generate Firebase rules from templates
        run: npm run generate:rules
        env:
          VITE_ADMIN_EMAILS: ${{ secrets.ADMIN_EMAILS }}

      - name: Build Angular app (production)
        run: npx nx build --configuration=production

      - name: Build Cloud Functions
        run: npm run build
        working-directory: functions

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy to Firebase (Hosting + Functions + Firestore + Storage rules)
        run: |
          npx firebase-tools deploy \
            --only hosting,functions,firestore:rules,firestore:indexes,storage \
            --project ${{ secrets.FIREBASE_PROJECT_ID }} \
            --non-interactive

      - name: Sync Anthropic API key to Functions secrets
        # Idempotent — safe to run on every deploy
        run: |
          echo "${{ secrets.ANTHROPIC_API_KEY }}" | \
            npx firebase-tools functions:secrets:set ANTHROPIC_API_KEY \
              --project ${{ secrets.FIREBASE_PROJECT_ID }} \
              --non-interactive
        continue-on-error: true