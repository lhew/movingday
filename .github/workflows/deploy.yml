name: Deploy to Firebase

on:
  # Runs automatically after CI completes — only deploys if every CI job passed
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  # Manual override — rebuilds from source (useful for hotfixes / re-deploys)
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    # For workflow_run: only proceed when all CI jobs succeeded
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      # Always install deps — firebase-tools lives in node_modules
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # ── workflow_run path: reuse the artifact built (and tested) by CI ──────
      - name: Download build artifact from CI
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: dist
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: dist/

      # ── workflow_dispatch path: build fresh with injected env secrets ────────
      - name: Inject environment values into environment.prod.ts
        if: github.event_name == 'workflow_dispatch'
        run: |
          sed -i "s|%%FIREBASE_API_KEY%%|${{ secrets.FIREBASE_API_KEY }}|g" src/environments/environment.prod.ts
          sed -i "s|%%FIREBASE_AUTH_DOMAIN%%|${{ secrets.FIREBASE_AUTH_DOMAIN }}|g" src/environments/environment.prod.ts
          sed -i "s|%%FIREBASE_PROJECT_ID%%|${{ secrets.FIREBASE_PROJECT_ID }}|g" src/environments/environment.prod.ts
          sed -i "s|%%FIREBASE_STORAGE_BUCKET%%|${{ secrets.FIREBASE_STORAGE_BUCKET }}|g" src/environments/environment.prod.ts
          sed -i "s|%%FIREBASE_MESSAGING_SENDER_ID%%|${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}|g" src/environments/environment.prod.ts
          sed -i "s|%%FIREBASE_APP_ID%%|${{ secrets.FIREBASE_APP_ID }}|g" src/environments/environment.prod.ts
          sed -i "s|%%ADMIN_EMAIL%%|${{ secrets.ADMIN_EMAIL }}|g" src/environments/environment.prod.ts

      - name: Verify injection
        if: github.event_name == 'workflow_dispatch'
        run: |
          if grep -q '%%' src/environments/environment.prod.ts; then
            echo "ERROR: Unreplaced placeholders found:"
            grep '%%' src/environments/environment.prod.ts
            exit 1
          else
            echo "All placeholders replaced successfully"
          fi

      - name: Build Angular app (production)
        if: github.event_name == 'workflow_dispatch'
        run: npx nx build --configuration=production

      # ── Deploy ───────────────────────────────────────────────────────────────
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy to Firebase (Hosting only)
        run: |
          npx firebase-tools deploy \
            --only hosting \
            --project production \
            --non-interactive

