name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Lint + Test ─────────────────────────────────────────────
  test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
  
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # Needed for Nx affected commands

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Derive Nx SHAs for affected
        uses: nrwl/nx-set-shas@v4

      - name: Lint
        run: npx nx affected -t lint --parallel=3

      - name: Unit tests
        env:
          CI: true
        run: npx nx run-many -t test --all --parallel=3 --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/movingday/lcov.info
          fail_ci_if_error: false

      - name: Generate stats.json
        run: npm run stats

      - name: Upload stats artifact
        uses: actions/upload-artifact@v5
        with:
          name: stats
          path: src/assets/stats.json
          retention-days: 30

  # ── Build ────────────────────────────────────────────────────
  build:
    name: Build App 
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Download stats artifact
        uses: actions/download-artifact@v5
        with:
          name: stats
          path: src/assets

      - name: Inject environment values into environment.prod.ts
        run: |
          sed -i "s|%%FIREBASE_API_KEY%%|${{ secrets.FIREBASE_API_KEY }}|g" src/environments/environment.prod.ts
          sed -i "s|%%FIREBASE_AUTH_DOMAIN%%|${{ secrets.FIREBASE_AUTH_DOMAIN }}|g" src/environments/environment.prod.ts
          sed -i "s|%%FIREBASE_PROJECT_ID%%|${{ secrets.FIREBASE_PROJECT_ID }}|g" src/environments/environment.prod.ts
          sed -i "s|%%FIREBASE_STORAGE_BUCKET%%|${{ secrets.FIREBASE_STORAGE_BUCKET }}|g" src/environments/environment.prod.ts
          sed -i "s|%%FIREBASE_MESSAGING_SENDER_ID%%|${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}|g" src/environments/environment.prod.ts
          sed -i "s|%%FIREBASE_APP_ID%%|${{ secrets.FIREBASE_APP_ID }}|g" src/environments/environment.prod.ts
          sed -i "s|%%ADMIN_EMAIL%%|${{ secrets.ADMIN_EMAIL }}|g" src/environments/environment.prod.ts

      - name: Build app
        run: npx nx build --configuration=production

      - name: Inject modulepreload links
        run: node scripts/add-preloads.mjs

      - name: Upload build artifact
        uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist/movingday/
          retention-days: 1

  # ── Prepare Deploy ───────────────────────────────────────────
  prepare-deploy:
    name: Prepare Deploy
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - name: Download app artifact
        uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/movingday

      - name: Upload deploy artifact
        uses: actions/upload-artifact@v5
        with:
          name: deploy-dist
          path: dist/movingday/
          retention-days: 1

  # ── E2E ──────────────────────────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build app for E2E mocks
        run: npx nx run movingday:build-e2e

      # Start the SSR server in the background; Cypress connects via ciBaseUrl.
      # The E2E build swaps all data/auth providers to internal mocks, including SSR.
      - name: Start SSR server
        run: node dist/movingday/server/server.mjs &

      - name: Wait for server to be ready
        run: |
          echo "Waiting for http://localhost:4200..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:4200 > /dev/null && echo "Server ready" && exit 0
            sleep 2
          done
          echo "Server did not start in time" && exit 1

      - name: Run E2E tests
        run: npx nx e2e --configuration=ci --browser=chrome

      - name: Upload Cypress screenshots on failure
        uses: actions/upload-artifact@v5
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/screenshots/
          retention-days: 5

