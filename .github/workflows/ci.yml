name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Lint + Test ─────────────────────────────────────────────
  test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
  
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Needed for Nx affected commands

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Derive Nx SHAs for affected
        uses: nrwl/nx-set-shas@v4

      - name: Lint
        run: npx nx affected -t lint --parallel=3

      - name: Unit tests
        env:
          CI: true
        run: npx nx run-many -t test --all --parallel=3 --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/movingday/lcov.info
          fail_ci_if_error: false

  # ── Build ────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build app
        run: npx nx build --configuration=production
        env:
          # These are replaced in environment.prod.ts via sed in deploy.yml
          # For CI we just verify the build succeeds
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ── E2E ──────────────────────────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: 
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # No emulators needed — Auth, ItemsService, and UpdatesService are all
      # replaced with in-memory mocks when Cypress is detected (useCypressMocks).
      # Firebase SDK emulator connectors are configured but never exercised.

      - name: Start server and run Cypress
        uses: cypress-io/github-action@v6
        with:
          install-command: npm ci --legacy-peer-deps
          start: npx nx serve
          wait-on: 'http://localhost:4200'
          wait-on-timeout: 60
          browser: chrome
          headed: false
          

